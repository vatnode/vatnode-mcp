name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm via Trusted Publishing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Node 24 ships with npm >= 11, required for Trusted Publishing OIDC
          # to authenticate the registry PUT (not just provenance signing).
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - name: Publish to npm
        run: npm publish --provenance --access public

      # Publish to the official MCP Registry (registry.modelcontextprotocol.io).
      # Uses GitHub OIDC — no secret needed; id-token: write is already granted
      # above. The io.github.vatnode/* namespace is authorized by the OIDC token's
      # repository owner (vatnode). server.json version must match the npm version.
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
